# https://github.com/marketplace/actions/install-nix

name: "ci-nix"
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: "ci-nix-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v27

      - name: Restore and cache Nix store
        uses: nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.nix', 'cabal.project', '**/*.cabal') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1073741824
          purge: true
          purge-prefixes: cache-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build library in nix shell
        run: |
          nix develop --accept-flake-config .#ghc966 -c cabal build lib:cardano-datum-formats
